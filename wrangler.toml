# Worker único que serve o CRM E as Landing Pages.
#   _site/            -> CRM (SPA na raiz)
#   _site/<slug>/     -> LP de cada empreendimento, no caminho do slug
# O Cloudflare serve arquivo exato antes do fallback SPA: /now-residence/
# entrega a LP; /funil (sem arquivo) cai no index.html do CRM.
# Monte _site com ./build-site.sh antes do deploy.
name = "crm-remax"
compatibility_date = "2025-01-01"

[assets]
directory = "./_site"
not_found_handling = "single-page-application"
