<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Obrigado! · Recebemos seu contato</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<!-- Mesma config da LP: carimba account_id + slug e dispara o PageView do obrigado -->
<script src="tracking.config.js"></script>
<style>
  :root{
    --c-dark:#181818; --c-darker:#0E0E0E; --c-light:#FFFFFF;
    --c-accent:#EC008C; --c-accent-deep:#C2006F; --c-muted:#9A9A9A;
    --font-display:'Anton',sans-serif; --font-body:'Manrope',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:var(--c-dark);color:var(--c-light);
    font-family:var(--font-body);display:flex;align-items:center;justify-content:center;
    padding:2rem;text-align:center;
    background-image:radial-gradient(ellipse at top,rgba(236,0,140,.10),transparent 60%)}
  .card{max-width:560px;width:100%}
  .check{width:84px;height:84px;border-radius:50%;background:var(--c-accent);
    display:flex;align-items:center;justify-content:center;margin:0 auto 1.8rem;
    box-shadow:0 18px 50px rgba(236,0,140,.35)}
  .check svg{width:42px;height:42px;stroke:#fff;stroke-width:3;fill:none}
  h1{font-family:var(--font-display);font-weight:400;text-transform:uppercase;
    font-size:clamp(2.4rem,7vw,3.6rem);line-height:.95;letter-spacing:.01em;margin-bottom:1rem}
  h1 .accent{color:var(--c-accent)}
  p{color:#D6D6D6;font-size:1.05rem;line-height:1.6;font-weight:300;margin-bottom:.6rem}
  .sub{color:var(--c-muted);font-size:.92rem;margin-bottom:2.2rem}
  .actions{display:flex;flex-direction:column;gap:.8rem;align-items:center}
  .btn{display:inline-flex;align-items:center;gap:.6rem;font-weight:600;font-size:.82rem;
    letter-spacing:.06em;text-transform:uppercase;padding:1rem 2rem;border-radius:2px;
    transition:all .3s ease;text-decoration:none;border:1px solid transparent;cursor:pointer}
  .btn-magenta{background:var(--c-accent);color:#fff}
  .btn-magenta:hover{background:var(--c-accent-deep);transform:translateY(-2px)}
  .btn-ghost{color:var(--c-muted);font-size:.8rem;letter-spacing:.04em;text-decoration:none}
  .btn-ghost:hover{color:#fff}
</style>
</head>
<body>
  <main class="card">
    <div class="check" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>Obrigado<span id="nome"></span>!<br/><span class="accent">recebemos seu contato</span></h1>
    <p id="msg">Seus dados chegaram. Um corretor entrará em contato em breve.</p>
    <p class="sub">Enquanto isso, se preferir falar agora, é só chamar no WhatsApp 👇</p>
    <div class="actions">
      <a id="zap" class="btn btn-magenta" target="_blank" rel="noopener" style="display:none">
        Falar agora no WhatsApp
      </a>
      <a id="voltar" class="btn-ghost" href="./">← Voltar para a página</a>
    </div>
  </main>

<script>
(function(){
  var cfg = window.NOW_TRACKING || {};

  // 1) Nome personalizado (vem do submit via sessionStorage, ou ?nome= na URL)
  var nome = "";
  try { nome = sessionStorage.getItem("lead_nome") || ""; } catch(e){}
  if(!nome){
    var q = new URLSearchParams(location.search).get("nome");
    if(q) nome = q;
  }
  if(nome){
    var primeiro = String(nome).trim().split(/\s+/)[0];
    if(primeiro) document.getElementById("nome").textContent = ", " + primeiro;
  }

  // 2) Marca da conta na mensagem (padrão, lido da config — nada hardcodado)
  if(cfg.account_name){
    document.getElementById("msg").textContent =
      "Seus dados chegaram. Um corretor da " + cfg.account_name + " entrará em contato em breve.";
  }

  // 3) Botão de WhatsApp montado a partir da config da LP
  var wa = cfg.whatsapp || {};
  if(wa.number){
    var msg = encodeURIComponent(wa.message || "Olá! Acabei de preencher o formulário e quero saber mais.");
    var btn = document.getElementById("zap");
    btn.href = "https://wa.me/" + String(wa.number).replace(/\D/g,"") + "?text=" + msg;
    btn.style.display = "inline-flex";
  }

  // 4) Conversão: dispara o evento de visualização do obrigado (além do PageView automático)
  if(window.NOW_TRACK) NOW_TRACK("ThankYouView", { channel: "form" });

  // 5) Limpa o nome guardado pra não vazar pra uma próxima visita
  try { sessionStorage.removeItem("lead_nome"); } catch(e){}
})();
</script>
</body>
</html>
